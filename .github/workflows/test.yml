name: Integration Tests

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test:
    name: Run Tests (`bun test`)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://whimsync:whimsync_dev_pass@localhost:5432/whimsync
      REDIS_URL: redis://localhost:6379
      CLERK_SECRET_KEY: "" # Empty to enable test header auth bypass in clerkAuth

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: whimsync
          POSTGRES_PASSWORD: whimsync_dev_pass
          POSTGRES_DB: whimsync
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U whimsync -d whimsync"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun & Dependencies
        uses: ./.github/actions/setup-bun

      - name: Run Database Migrations
        run: bun run db:migrate

      - name: Run Integration Tests
        run: bun run test
