name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint & Format
    uses: ./.github/workflows/lint.yml

  typecheck:
    name: Type Check
    uses: ./.github/workflows/typecheck.yml

  test:
    name: Integration Tests
    uses: ./.github/workflows/test.yml
